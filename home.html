<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teir Enta Booking</title>
    <link rel="stylesheet" href="home.css">
</head>

<body>

    <nav class="navbar">
        <div class="brand">
            <img src="./images/Plane.png" alt="Plane Logo" class="logo">
            <h3 class="company-name">TEIR ENTA</h3>
        </div>

        <div class="nav-links">
            <a href="home.html">HOME</a>
            <a href="trips.html">MY TRIPS</a>
            <a href="notifications.html">NOTIFICATIONS</a>
        </div>

        <input type="text" placeholder="Search..." class="search-bar">
        <input type="button" value="Search" class="search-button">
    </nav>

    <div class="container">

        <h1 class="text">
            <span>WHERE</span><br>
            <span class="to-text">TO</span><br>
            <span>NEXT?</span>
        </h1>

        <div class="Plane-form">

            <h2>Plan Your Journey</h2>

            <form action="/submit" method="post">

                <label for="from">From:</label>
                <input
                    type="text"
                    id="from"
                    name="from"
                    placeholder="Departure City"
                    required>

                <br><br>

                <label for="to">To:</label>
                <input
                    type="text"
                    id="to"
                    name="to"
                    placeholder="Destination City"
                    required>

                <br><br>

                <div class="row">

                    <div class="field1">

                        <label for="date">Date</label>
                        <input
                            type="date"
                            id="date"
                            name="date"
                            required>

                        <div>

                            <label class="passengers" for="passengers">
                                Passengers
                            </label>

                            <select
                                id="passengers"
                                name="passengers"
                                class="passengers-input passengers-select">

                                <option>1 Adult</option>
                                <option>2 Adults</option>
                                <option>3 Adults</option>
                                <option>4 Adults</option>
                                <option>5 Adults</option>
                                <option>6 Adults</option>
                                <option>7 Adults</option>
                                <option>8 Adults</option>
                                <option>8 or More Adults</option>

                            </select>

                        </div>

                    </div>

                </div>

                <button type="submit" class="submit-button">
                    Search Flights
                </button>

            </form>

        </div>

    </div>

</body>

</html>
